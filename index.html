<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة الاختبارات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        :root { --primary: #6366f1; --secondary: #a855f7; --success: #10b981; --error: #ef4444; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 28px;
            width: 100%;
        }

        .option-btn { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .option-btn:active:not(:disabled) { transform: scale(0.97); }

        .option-btn.correct { 
            background: var(--success) !important; 
            border-color: #34d399; 
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            animation: pulse-success 0.5s ease;
        }

        .option-btn.incorrect { 
            background: var(--error) !important; 
            border-color: #f87171; 
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: shake 0.4s ease;
        }
        
        @keyframes pulse-success {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .progress-bar { height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.4s ease; }
        
        .spinner { 
            width: 40px; height: 40px; 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .settings-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        input, select { -webkit-appearance: none; }

        /* تجميل شريط مستوى الصوت */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-md px-4 py-6"></div>

    <!-- نافذة الإعدادات -->
    <div id="settingsModal" class="settings-modal px-4">
        <div class="glass-card p-6 w-full max-w-sm fade-in shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">إعدادات اللعبة</h3>
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-white p-2">✕</button>
            </div>
            
            <div class="space-y-4 text-right max-h-[70vh] overflow-y-auto pr-1">
                <!-- إعداد المؤقت -->
                <div class="flex items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">⏱️</span>
                        <div>
                            <p class="font-bold text-sm">مؤقت السؤال</p>
                            <p class="text-[10px] text-slate-400">تحديد وقت لكل سؤال</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="timerToggle" class="sr-only peer" onchange="updateSettings()">
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>

                <div id="timerSetting" class="hidden pr-2">
                    <label class="block text-xs font-bold mb-2 text-slate-400 mr-1">وقت السؤال (ثانية)</label>
                    <input type="number" id="timerValue" min="5" max="60" value="15" oninput="updateSettings()"
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-3 text-white outline-none">
                </div>

                <!-- إعداد الصوت -->
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-xl" id="soundIcon">🔊</span>
                            <div>
                                <p class="font-bold text-sm">المؤثرات الصوتية</p>
                                <p class="text-[10px] text-slate-400">تشغيل أو إيقاف الأصوات</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="soundToggle" class="sr-only peer" onchange="updateSettings()">
                            <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                    <div id="volumeSetting" class="pt-2 px-1">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] text-slate-500">منخفض</span>
                            <span class="text-[10px] text-slate-500">مرتفع</span>
                        </div>
                        <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5" 
                               class="w-full cursor-pointer" oninput="updateSettings()">
                    </div>
                </div>

                <!-- إعداد إظهار الإجابة الصحيحة -->
                <div class="flex items-center justify-between bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">👁️</span>
                        <div>
                            <p class="font-bold text-sm">إظهار الإجابة</p>
                            <p class="text-[10px] text-slate-400">كشف الإجابة الصحيحة فوراً</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="showCorrectToggle" class="sr-only peer" onchange="updateSettings()">
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>

                <div class="pt-4 border-t border-slate-700/50">
                    <button onclick="clearAllData()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 font-bold py-3 rounded-2xl transition-all">
                        🗑️ مسح كل التقدم والبيانات
                    </button>
                </div>
            </div>
            
            <button onclick="toggleSettings()" class="w-full mt-6 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-2xl transition-all">تأكيد الإعدادات</button>
        </div>
    </div>

    <script>
        // الأصوات
        const sounds = {
            correct: new Audio('./correct.mp3'),
            wrong: new Audio('./wrong.mp3'),
            click: new Audio('./click.mp3'),
            timeout: new Audio('./timeout.mp3')
        };

        const playSound = (type) => {
            if (state.settings.soundEnabled && sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].volume = state.settings.volume;
                sounds[type].play().catch(e => console.log('Audio error:', e));
            }
        };

        const BASE_URL = './'; 
        const topics = [
            { id: 'history.json', name: 'التاريخ', icon: '📜' },
            { id: 'geography.json', name: 'الجغرافيا', icon: '🌍' },
            { id: 'science.json', name: 'العلوم', icon: '🧪' },
            { id: 'mathematics.json', name: 'الرياضيات', icon: '📐' },
            { id: 'general.json', name: 'ثقافة عامة', icon: '💡' },
            { id: 'medicine.json', name: 'الطب', icon: '🏥' },
            { id: 'arlang.json', name: 'اللغة العربية', icon: '🖋️' },
            { id: 'sports.json', name: 'الرياضة', icon: '⚽' },
            { id: 'technology.json', name: 'تكنولوجيا', icon: '💻' },
            { id: 'arts.json', name: 'فنون وثقافات', icon: '🎨' },
            { id: 'religion.json', name: 'أديان', icon: '🕌' },
            { id: 'economy.json', name: 'اقتصاد', icon: '📈' },
            { id: 'dailylife.json', name: 'الحياة اليومية', icon: '🏠' },
            { id: 'animals.json', name: 'مملكة الغابة', icon: '🦁' },
            { id: 'brain.json', name: 'ألعاب العقل', icon: '🧠' },
            { id: 'arabicquiz.json', name: 'عام (متطور)', icon: '🌟' }
        ];

        let state = {
            playerName: localStorage.getItem('quiz_player_name') || '',
            highScore: parseInt(localStorage.getItem('quiz_high_score')) || 0,
            questions: [],
            currentIndex: 0,
            score: 0,
            showResult: false,
            feedback: null,
            selectedQuestions: [],
            currentOptions: [],
            quizStarted: false,
            isLoading: false,
            fetchError: false,
            currentTopicId: localStorage.getItem('quiz_last_topic') || topics[0].id,
            hasSavedProgress: !!localStorage.getItem('quiz_saved_progress'),
            settings: JSON.parse(localStorage.getItem('quiz_settings')) || { 
                useTimer: false, 
                timerSeconds: 15, 
                showCorrect: false,
                soundEnabled: true,
                volume: 0.5
            },
            timeLeft: 0,
            timerId: null
        };

        function shuffle(array) { 
            return array.sort(() => Math.random() - 0.5); 
        }

        async function fetchQuestions(topicId) {
            state.isLoading = true;
            state.fetchError = false;
            state.currentTopicId = topicId;
            localStorage.setItem('quiz_last_topic', topicId);
            render();
            
            try {
                const response = await fetch(BASE_URL + topicId);
                if (!response.ok) throw new Error("Local file not found");
                const data = await response.json();
                state.questions = Array.isArray(data) ? data : (data.questions || []);
            } catch (err) {
                try {
                    const remoteUrl = 'https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/' + topicId;
                    const response = await fetch(remoteUrl);
                    const data = await response.json();
                    state.questions = Array.isArray(data) ? data : (data.questions || []);
                } catch(e) {
                    state.questions = [];
                    state.fetchError = true;
                }
            } finally {
                state.isLoading = false;
                render();
            }
        }

        window.updateName = (name) => {
            state.playerName = name;
            localStorage.setItem('quiz_player_name', name);
        };

        window.toggleSettings = () => {
            playSound('click');
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('active');
            
            document.getElementById('timerToggle').checked = state.settings.useTimer;
            document.getElementById('showCorrectToggle').checked = state.settings.showCorrect;
            document.getElementById('timerValue').value = state.settings.timerSeconds;
            document.getElementById('soundToggle').checked = state.settings.soundEnabled;
            document.getElementById('volumeControl').value = state.settings.volume;
            
            document.getElementById('timerSetting').style.display = state.settings.useTimer ? 'block' : 'none';
            document.getElementById('volumeSetting').style.opacity = state.settings.soundEnabled ? '1' : '0.5';
            document.getElementById('soundIcon').innerText = state.settings.soundEnabled ? (state.settings.volume > 0.5 ? '🔊' : '🔉') : '🔇';
        };

        window.updateSettings = () => {
            state.settings.useTimer = document.getElementById('timerToggle').checked;
            state.settings.showCorrect = document.getElementById('showCorrectToggle').checked;
            state.settings.timerSeconds = parseInt(document.getElementById('timerValue').value) || 15;
            state.settings.soundEnabled = document.getElementById('soundToggle').checked;
            state.settings.volume = parseFloat(document.getElementById('volumeControl').value);
            
            document.getElementById('timerSetting').style.display = state.settings.useTimer ? 'block' : 'none';
            document.getElementById('volumeSetting').style.opacity = state.settings.soundEnabled ? '1' : '0.5';
            document.getElementById('soundIcon').innerText = state.settings.soundEnabled ? (state.settings.volume > 0.5 ? '🔊' : '🔉') : '🔇';
            
            localStorage.setItem('quiz_settings', JSON.stringify(state.settings));
        };

        window.clearAllData = () => {
            if(confirm("هل أنت متأكد من حذف كافة البيانات والنتائج؟")) {
                localStorage.clear();
                location.reload();
            }
        };

        window.saveProgress = () => {
            if (state.quizStarted && !state.showResult) {
                const data = {
                    topicId: state.currentTopicId,
                    currentIndex: state.currentIndex,
                    score: state.score,
                    selectedQuestions: state.selectedQuestions,
                    playerName: state.playerName
                };
                localStorage.setItem('quiz_saved_progress', JSON.stringify(data));
            }
        };

        window.clearSavedProgress = () => {
            localStorage.removeItem('quiz_saved_progress');
            state.hasSavedProgress = false;
        };

        window.resumeQuiz = () => {
            playSound('click');
            const saved = localStorage.getItem('quiz_saved_progress');
            if (saved) {
                const data = JSON.parse(saved);
                state.currentTopicId = data.topicId;
                state.currentIndex = data.currentIndex;
                state.score = data.score;
                state.selectedQuestions = data.selectedQuestions;
                state.playerName = data.playerName;
                state.quizStarted = true;
                state.showResult = false;
                state.feedback = null;
                prepareQuestion();
                render();
            }
        };

        window.startQuiz = () => {
            if (state.questions.length === 0) return;
            if (!state.playerName.trim()) {
                alert("يرجى إدخال اسمك أولاً");
                return;
            }
            
            playSound('click');
            const input = document.getElementById('numInput');
            const count = Math.min(parseInt(input.value) || 10, state.questions.length);
            state.selectedQuestions = shuffle([...state.questions]).slice(0, count);
            state.quizStarted = true;
            state.currentIndex = 0;
            state.score = 0;
            state.showResult = false;
            state.feedback = null;
            window.clearSavedProgress();
            prepareQuestion();
            render();
        };

        function startTimer() {
            if (!state.settings.useTimer) return;
            clearInterval(state.timerId);
            state.timeLeft = state.settings.timerSeconds;
            state.timerId = setInterval(() => {
                state.timeLeft--;
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    timerEl.innerText = state.timeLeft;
                    if (state.timeLeft <= 5) timerEl.classList.add('text-red-500');
                }
                
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerId);
                    playSound('timeout');
                    handleSelect(null);
                }
            }, 1000);
        }

        function prepareQuestion() {
            if (state.selectedQuestions[state.currentIndex]) {
                state.currentOptions = shuffle([...state.selectedQuestions[state.currentIndex].options]);
                startTimer();
            }
        }

        window.handleSelect = (option) => {
            if (state.feedback) return;
            clearInterval(state.timerId);
            const currentQ = state.selectedQuestions[state.currentIndex];
            const isCorrect = option === currentQ.correctAnswer;
            
            if (isCorrect) {
                state.score++;
                playSound('correct');
            } else {
                playSound('wrong');
            }

            state.feedback = { isCorrect, selected: option };
            window.saveProgress();
            render();
        };

        window.nextStep = () => {
            playSound('click');
            if (state.currentIndex + 1 < state.selectedQuestions.length) {
                state.currentIndex++;
                state.feedback = null;
                window.saveProgress();
                prepareQuestion();
            } else {
                state.showResult = true;
                window.clearSavedProgress();
                if (state.score > state.highScore) {
                    state.highScore = state.score;
                    localStorage.setItem('quiz_high_score', state.highScore);
                }
            }
            render();
        };

        window.changeTopic = (e) => {
            playSound('click');
            fetchQuestions(e.target.value);
        };

        window.restart = () => {
            playSound('click');
            state.quizStarted = false;
            state.showResult = false;
            state.hasSavedProgress = !!localStorage.getItem('quiz_saved_progress');
            render();
        };

        function render() {
            const root = document.getElementById('app');
            
            if (state.isLoading) {
                root.innerHTML = `<div class="glass-card p-12 flex flex-col items-center"><div class="spinner mb-4"></div><p>جاري التحميل...</p></div>`;
                return;
            }

            if (!state.quizStarted) {
                root.innerHTML = `
                    <div class="glass-card p-6 md:p-8 fade-in text-center relative overflow-hidden">
                        <button onclick="toggleSettings()" class="absolute top-4 left-4 text-slate-500 hover:text-indigo-400 transition-colors p-2 rounded-xl hover:bg-white/5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                        
                        <div class="mb-6">
                            <span class="text-6xl mb-4 block">🏆</span>
                            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">تحدي المعرفة</h1>
                            ${state.highScore > 0 ? `<p class="text-xs text-indigo-300 mt-2 font-bold uppercase tracking-widest">أعلى نتيجة: ${state.highScore}</p>` : ''}
                        </div>

                        <div class="space-y-5 text-right">
                            <div>
                                <label class="block text-xs font-bold mb-2 text-slate-400 mr-1 uppercase">اسم اللاعب</label>
                                <input type="text" oninput="updateName(this.value)" value="${state.playerName}" placeholder="أدخل اسمك..." 
                                    class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-xs font-bold mb-2 text-slate-400 mr-1 uppercase">الموضوع</label>
                                <div class="relative">
                                    <select onchange="changeTopic(event)" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none appearance-none">
                                        ${topics.map(t => `<option value="${t.id}" ${state.currentTopicId === t.id ? 'selected' : ''}>${t.icon} ${t.name}</option>`).join('')}
                                    </select>
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">▼</div>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="col-span-2 sm:col-span-1">
                                    <label class="block text-xs font-bold mb-2 text-slate-400 mr-1 uppercase">العدد <span class="text-indigo-400 text-[10px] font-bold mr-1">(المتاح: ${state.questions.length})</span></label>
                                    <input type="number" id="numInput" value="${Math.min(10, state.questions.length || 10)}" min="1" max="${state.questions.length || 10}" 
                                        class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-center text-white font-bold outline-none">
                                </div>
                                <div class="col-span-2 sm:col-span-1 flex gap-2 items-end">
                                    <button onclick="startQuiz()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">بدء</button>
                                    ${state.hasSavedProgress ? `
                                        <button onclick="resumeQuiz()" title="استئناف اللعب السابق" class="bg-amber-500 hover:bg-amber-400 text-white px-4 rounded-2xl transition-all active:scale-95 shadow-lg flex items-center justify-center">
                                            <span class="text-xl">🕒</span>
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>`;
                return;
            }

            if (state.showResult) {
                const percent = Math.round((state.score / state.selectedQuestions.length) * 100);
                root.innerHTML = `
                    <div class="glass-card p-8 text-center fade-in">
                        <h2 class="text-xl font-bold mb-2">انتهيت يا ${state.playerName}!</h2>
                        <div class="text-6xl font-bold text-indigo-400 my-6">${percent}%</div>
                        <div class="bg-slate-800/50 rounded-2xl p-4 mb-8">
                            <p class="text-slate-300 text-sm">أصبت في <span class="text-white font-bold">${state.score}</span> من ${state.selectedQuestions.length}</p>
                        </div>
                        <button onclick="restart()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">تحدي جديد</button>
                    </div>`;
                return;
            }

            const q = state.selectedQuestions[state.currentIndex];
            const progress = ((state.currentIndex) / state.selectedQuestions.length) * 100;

            root.innerHTML = `
                <div class="glass-card p-6 fade-in flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-4 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                        <span>سؤال ${state.currentIndex + 1} / ${state.selectedQuestions.length}</span>
                        ${state.settings.useTimer && !state.feedback ? `
                            <span class="bg-slate-800 px-3 py-1 rounded-full text-indigo-400 font-mono">⏱️ <span id="timerDisplay">${state.timeLeft}</span></span>
                        ` : ''}
                        <span>النقاط: ${state.score}</span>
                    </div>
                    <div class="progress-bar mb-6"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <div class="flex-1">
                        <h2 class="text-lg font-bold mb-8 text-right leading-relaxed">${q.question}</h2>
                        <div class="grid gap-4 mb-6">
                            ${state.currentOptions.map(opt => {
                                let cls = '';
                                let icon = '';
                                
                                if (state.feedback || state.settings.showCorrect) {
                                    if (opt === q.correctAnswer) {
                                        cls = 'correct';
                                        icon = '<span class="text-xl fade-in">✅</span>';
                                    } else if (state.feedback && opt === state.feedback.selected) {
                                        cls = 'incorrect';
                                        icon = '<span class="text-xl fade-in">❌</span>';
                                    } else if (state.feedback) {
                                        cls = 'opacity-30 scale-95';
                                    }
                                }

                                return `
                                    <button 
                                        onclick="handleSelect('${opt.replace(/'/g, "\\'")}')" 
                                        ${state.feedback ? 'disabled' : ''} 
                                        class="option-btn w-full rounded-2xl bg-slate-800/40 text-sm font-bold ${cls}"
                                    >
                                        <span class="flex-1">${opt}</span>
                                        ${icon}
                                    </button>`;
                            }).join('')}
                        </div>
                    </div>
                    ${state.feedback ? `
                        <div class="mt-4 pt-4 border-t border-slate-700/50 fade-in">
                            <button onclick="nextStep()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                                ${state.currentIndex + 1 === state.selectedQuestions.length ? 'انتهى الاختبار - عرض النتائج' : 'السؤال التالي ⬅️'}
                            </button>
                        </div>
                    ` : ''}
                </div>`;
        }

        fetchQuestions(state.currentTopicId);
    </script>
</body>
</html>
