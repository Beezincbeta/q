<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة الاختبارات الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            min-height: 100vh;
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .nav-bar {
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 32px 32px 0 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:active { transform: scale(0.95); }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
            position: relative;
        }

        .option-card.correct {
            background: #10b981 !important;
            border-color: #34d399;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        .option-card.incorrect {
            background: #ef4444 !important;
            border-color: #f87171;
        }

        .progress-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .progress-thumb {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .stat-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 20px;
        }

        /* Custom Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-md px-4 py-8"></div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="overlay px-4">
        <div class="glass-panel p-8 w-full max-w-sm animate-up border-white/20">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-2">
                    <i data-lucide="settings-2" class="w-5 h-5 text-indigo-400"></i>
                    <h3 class="text-xl font-extrabold">إعدادات اللعبة</h3>
                </div>
                <button onclick="toggleSettings()" class="text-slate-400 p-2 hover:bg-white/5 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="space-y-5 text-right">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <i data-lucide="timer" class="w-5 h-5 text-indigo-400"></i>
                        <span class="font-bold text-sm">مؤقت التحدي</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="timerToggle" onchange="updateSettings()">
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="timerInputArea" class="hidden animate-up">
                    <div class="flex items-center gap-2 bg-white/5 p-3 rounded-xl">
                        <span class="text-xs text-slate-400 flex-1">الثواني:</span>
                        <input type="number" id="timerValue" min="5" max="60" oninput="updateSettings()" class="w-20 bg-transparent text-center font-bold text-indigo-400 focus:outline-none">
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <i data-lucide="eye" class="w-5 h-5 text-emerald-400"></i>
                        <span class="font-bold text-sm">زر كشف الإجابة</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="revealToggle" onchange="updateSettings()">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i data-lucide="volume-2" class="w-5 h-5 text-indigo-400"></i>
                            <span class="font-bold text-sm">المؤثرات الصوتية</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="soundToggle" onchange="updateSettings()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <input type="range" id="volumeControl" min="0" max="1" step="0.1" oninput="updateSettings()" class="w-full accent-indigo-500 bg-white/10 h-1.5 rounded-lg appearance-none cursor-pointer">
                </div>

                <button onclick="showAlert('confirmation')" class="w-full py-4 text-red-400 border border-red-500/20 rounded-2xl text-xs font-bold bg-red-500/5 hover:bg-red-500/10 transition-colors">
                    مسح كافة البيانات وإعادة الضبط
                </button>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="customAlert" class="overlay px-4">
        <div class="glass-panel p-8 w-full max-w-sm text-center animate-up border-indigo-500/30">
            <div id="alertIcon" class="text-5xl mb-4">⚠️</div>
            <h3 id="alertTitle" class="text-xl font-bold mb-2">تنبيه</h3>
            <p id="alertMessage" class="text-slate-400 mb-8 text-sm leading-relaxed"></p>
            <div id="alertActions" class="flex gap-3">
                <button onclick="closeAlert()" class="flex-1 bg-white/10 py-3 rounded-2xl font-bold text-sm">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sounds = {
            correct: new Audio('https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/correct.mp3'),
            wrong: new Audio('https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/wrong.mp3'),
            click: new Audio('https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/click.mp3'),
            timeout: new Audio('https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/timeout.mp3')
        };

        const topics = [
            { id: 'history.json', name: 'التاريخ', icon: '📜' },
            { id: 'geography.json', name: 'الجغرافيا', icon: '🌍' },
            { id: 'science.json', name: 'العلوم', icon: '🧪' },
            { id: 'mathematics.json', name: 'الرياضيات', icon: '📐' },
            { id: 'general.json', name: 'ثقافة عامة', icon: '💡' },
            { id: 'medicine.json', name: 'الطب', icon: '🏥' },
            { id: 'arlang.json', name: 'اللغة العربية', icon: '🖋️' },
            { id: 'sports.json', name: 'الرياضة', icon: '⚽' },
            { id: 'technology.json', name: 'تكنولوجيا', icon: '💻' },
            { id: 'arts.json', name: 'فنون وثقافات', icon: '🎨' },
            { id: 'religion.json', name: 'أديان', icon: '🕌' },
            { id: 'economy.json', name: 'اقتصاد', icon: '📈' },
            { id: 'dailylife.json', name: 'الحياة اليومية', icon: '🏠' },
            { id: 'animals.json', name: 'مملكة الغابة', icon: '🦁' },
            { id: 'brain.json', name: 'ألعاب العقل', icon: '🧠' },
            { id: 'arabicquiz.json', name: 'عام (متطور)', icon: '🌟' }
        ];

        let state = {
            playerName: localStorage.getItem('player_name') || '',
            highScore: parseInt(localStorage.getItem('high_score')) || 0,
            lastResult: localStorage.getItem('last_result_summary') || '0 / 0',
            questions: [],
            selectedQuestions: [],
            currentTopicId: localStorage.getItem('last_topic') || topics[0].id,
            currentIndex: 0,
            score: 0,
            quizStarted: false,
            showResult: false,
            feedback: null,
            isLoading: false,
            currentOptions: [],
            timeLeft: 0,
            timerId: null,
            revealed: false,
            // زر الكشف مطفي افتراضياً
            settings: JSON.parse(localStorage.getItem('settings')) || {
                useTimer: false,
                timerSeconds: 15,
                soundEnabled: true,
                volume: 0.5,
                enableReveal: false 
            }
        };

        function playSfx(type) {
            if (state.settings.soundEnabled) {
                sounds[type].volume = state.settings.volume;
                sounds[type].currentTime = 0;
                sounds[type].play().catch(() => {});
            }
        }

        async function fetchQuestions(topicId) {
            state.isLoading = true;
            state.currentTopicId = topicId;
            localStorage.setItem('last_topic', topicId);
            render();
            try {
                const response = await fetch(`https://raw.githubusercontent.com/beezincbeta/q/refs/heads/main/${topicId}`);
                const data = await response.json();
                state.questions = Array.isArray(data) ? data : (data.questions || []);
            } catch(e) { 
                state.questions = []; 
            } finally {
                state.isLoading = false;
                render();
            }
        }

        window.startQuiz = () => {
            if (!state.playerName.trim()) return showAlert('nameRequired');
            playSfx('click');
            const countInput = document.getElementById('numInput');
            const max = state.questions.length;
            let count = parseInt(countInput?.value) || 10;
            
            if (count > max) count = max;
            if (count < 1) count = 1;

            state.selectedQuestions = [...state.questions].sort(() => 0.5 - Math.random()).slice(0, count);
            state.quizStarted = true;
            state.currentIndex = 0;
            state.score = 0;
            state.showResult = false;
            localStorage.removeItem('saved_progress');
            prepareQuestion();
            render();
        };

        function prepareQuestion() {
            state.revealed = false;
            const q = state.selectedQuestions[state.currentIndex];
            if (q) {
                state.currentOptions = [...q.options].sort(() => 0.5 - Math.random());
                if (state.settings.useTimer) {
                    clearInterval(state.timerId);
                    state.timeLeft = state.settings.timerSeconds;
                    state.timerId = setInterval(() => {
                        state.timeLeft--;
                        const display = document.getElementById('timerDisplay');
                        if (display) display.innerText = state.timeLeft;
                        if (state.timeLeft <= 0) handleSelect(null, true);
                    }, 1000);
                }
            }
        }

        window.revealAnswer = () => {
            if (state.feedback || state.revealed) return;
            state.revealed = true;
            playSfx('click');
            render();
        };

        window.handleSelect = (opt, isTimeout = false) => {
            if (state.feedback) return;
            clearInterval(state.timerId);
            const q = state.selectedQuestions[state.currentIndex];
            const isCorrect = opt === q.correctAnswer;
            
            if (isTimeout) playSfx('timeout');
            else if (isCorrect) { state.score++; playSfx('correct'); }
            else playSfx('wrong');

            state.feedback = { isCorrect, selected: opt, timedOut: isTimeout };
            state.lastResult = `${state.score} / ${state.selectedQuestions.length}`;
            localStorage.setItem('last_result_summary', state.lastResult);
            saveProgress();
            render();
        };

        window.nextStep = () => {
            playSfx('click');
            if (state.currentIndex + 1 < state.selectedQuestions.length) {
                state.currentIndex++;
                state.feedback = null;
                prepareQuestion();
                render();
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            state.showResult = true;
            state.lastResult = `${state.score} / ${state.selectedQuestions.length}`;
            localStorage.setItem('last_result_summary', state.lastResult);
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('high_score', state.highScore);
            }
            localStorage.removeItem('saved_progress');
            render();
        }

        function saveProgress() {
            if (state.quizStarted && !state.showResult) {
                localStorage.setItem('saved_progress', JSON.stringify({
                    topicId: state.currentTopicId,
                    currentIndex: state.currentIndex,
                    score: state.score,
                    selectedQuestions: state.selectedQuestions,
                    lastResult: state.lastResult
                }));
            }
        }

        window.resumeProgress = () => {
            const saved = JSON.parse(localStorage.getItem('saved_progress'));
            if (saved) {
                Object.assign(state, saved);
                state.quizStarted = true;
                state.feedback = null;
                prepareQuestion();
                render();
            }
        };

        window.toggleSettings = () => {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('active');
            if (modal.classList.contains('active')) {
                document.getElementById('timerToggle').checked = state.settings.useTimer;
                document.getElementById('revealToggle').checked = state.settings.enableReveal;
                document.getElementById('timerValue').value = state.settings.timerSeconds;
                document.getElementById('soundToggle').checked = state.settings.soundEnabled;
                document.getElementById('volumeControl').value = state.settings.volume;
                document.getElementById('timerInputArea').classList.toggle('hidden', !state.settings.useTimer);
            }
        };

        window.updateSettings = () => {
            state.settings.useTimer = document.getElementById('timerToggle').checked;
            state.settings.enableReveal = document.getElementById('revealToggle').checked;
            state.settings.timerSeconds = parseInt(document.getElementById('timerValue').value) || 15;
            state.settings.soundEnabled = document.getElementById('soundToggle').checked;
            state.settings.volume = parseFloat(document.getElementById('volumeControl').value);
            document.getElementById('timerInputArea').classList.toggle('hidden', !state.settings.useTimer);
            localStorage.setItem('settings', JSON.stringify(state.settings));
        };

        window.showAlert = (type) => {
            const modal = document.getElementById('customAlert');
            const title = document.getElementById('alertTitle');
            const msg = document.getElementById('alertMessage');
            const actions = document.getElementById('alertActions');
            
            actions.innerHTML = '<button onclick="closeAlert()" class="flex-1 bg-white/10 py-3 rounded-2xl font-bold text-sm">إلغاء</button>';
            
            if (type === 'nameRequired') {
                title.innerText = "هوية مجهولة";
                msg.innerText = "يرجى كتابة اسمك لنتمكن من عرض إحصائياتك في اللوحة الرئيسية.";
            } else if (type === 'confirmation') {
                title.innerText = "إعادة ضبط المصنع";
                msg.innerText = "هل أنت متأكد؟ سيتم حذف جميع النتائج والإحصائيات والاسم المسجل نهائياً.";
                actions.innerHTML += `<button onclick="localStorage.clear(); location.reload();" class="flex-1 bg-red-600 py-3 rounded-2xl font-bold text-sm">تأكيد الحذف</button>`;
            }
            modal.classList.add('active');
        };
        window.closeAlert = () => document.getElementById('customAlert').classList.remove('active');

        function render() {
            const root = document.getElementById('app');
            if (state.isLoading) {
                root.innerHTML = `<div class="glass-panel p-16 flex flex-col items-center animate-up"><div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div><p class="font-bold text-indigo-300">جاري تحميل الأسئلة...</p></div>`;
                return;
            }

            if (!state.quizStarted) {
                const saved = localStorage.getItem('saved_progress');
                root.innerHTML = `
                    <div class="glass-panel overflow-hidden animate-up">
                        <div class="nav-bar">
                            <div class="text-right">
                                <h1 class="text-lg font-black tracking-tight flex items-center gap-2">
                                    <i data-lucide="brain-circuit" class="w-5 h-5 text-indigo-400"></i>
                                    موسوعة الاختبارات
                                </h1>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">المحترف الذكي v3.1</p>
                            </div>
                            <button onclick="toggleSettings()" class="bg-white/5 p-3 rounded-2xl border border-white/10 hover:bg-white/10 transition-colors">
                                <i data-lucide="sliders" class="w-5 h-5 text-indigo-300"></i>
                            </button>
                        </div>
                        
                        <div class="p-8 space-y-6">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="stat-badge text-center">
                                    <div class="flex items-center justify-center gap-1 mb-1">
                                        <i data-lucide="trophy" class="w-3 h-3 text-indigo-400"></i>
                                        <span class="text-[8px] text-slate-500 uppercase font-black">أعلى نتيجة</span>
                                    </div>
                                    <p class="text-white font-black text-xl">${state.highScore}</p>
                                </div>
                                <div class="stat-badge text-center">
                                    <div class="flex items-center justify-center gap-1 mb-1">
                                        <i data-lucide="bar-chart-3" class="w-3 h-3 text-emerald-400"></i>
                                        <span class="text-[8px] text-slate-500 uppercase font-black">آخر نتيجة</span>
                                    </div>
                                    <p class="text-emerald-400 font-black text-xl">${state.lastResult}</p>
                                </div>
                            </div>

                            ${saved ? `
                            <div class="p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl flex items-center justify-between">
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-indigo-300">استكمال الاختبار؟</p>
                                    <p class="text-[11px] text-white font-bold opacity-70">${state.lastResult}</p>
                                </div>
                                <button onclick="resumeProgress()" class="bg-indigo-600 px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg hover:bg-indigo-500 transition-colors">استئناف اللعب</button>
                            </div>
                            ` : ''}

                            <div class="space-y-4 text-right">
                                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">اسم المتسابق</label>
                                    <div class="relative">
                                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                                        <input type="text" value="${state.playerName}" oninput="state.playerName=this.value; localStorage.setItem('player_name', this.value)" placeholder="أدخل اسمك هنا..." class="w-full bg-black/20 border border-white/10 px-6 py-4 rounded-xl outline-none font-bold text-sm focus:border-indigo-500/50">
                                    </div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="col-span-2 bg-white/5 p-4 rounded-2xl border border-white/5">
                                        <div class="flex justify-between items-center mb-2">
                                            <label class="text-[10px] font-bold text-slate-500 uppercase">مجال الأسئلة</label>
                                            <span class="text-[10px] font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded-md">
                                                المتوفر: ${state.questions.length} سؤال
                                            </span>
                                        </div>
                                        <select onchange="fetchQuestions(this.value)" class="w-full bg-transparent font-bold text-sm outline-none cursor-pointer">
                                            ${topics.map(t => `<option value="${t.id}" class="bg-slate-900" ${state.currentTopicId === t.id ? 'selected' : ''}>${t.icon} ${t.name}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                                        <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">العدد</label>
                                        <input type="number" id="numInput" value="10" max="${state.questions.length}" min="1" class="w-full bg-transparent font-black text-center text-lg focus:outline-none">
                                    </div>
                                    <button onclick="startQuiz()" class="btn-primary rounded-2xl font-black text-white text-lg hover:scale-[1.02] active:scale-[0.98]">
                                        انطلاق
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                lucide.createIcons();
                return;
            }

            if (state.showResult) {
                root.innerHTML = `
                    <div class="glass-panel p-10 text-center animate-up">
                        <div class="w-24 h-24 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="flag" class="w-12 h-12 text-indigo-400"></i>
                        </div>
                        <h2 class="text-2xl font-black mb-2">تم الانتهاء!</h2>
                        <p class="text-slate-400 mb-10 text-sm">يا ${state.playerName}، نتيجتك النهائية هي:</p>
                        <div class="text-7xl font-black text-indigo-400 mb-10 drop-shadow-xl">${state.lastResult}</div>
                        <button onclick="state.quizStarted=false; render()" class="btn-primary w-full py-5 rounded-2xl font-bold text-lg">العودة للرئيسية</button>
                    </div>`;
                lucide.createIcons();
                return;
            }

            const q = state.selectedQuestions[state.currentIndex];
            const progress = (state.currentIndex / state.selectedQuestions.length) * 100;

            root.innerHTML = `
                <div class="glass-panel flex flex-col min-h-[580px] animate-up overflow-hidden">
                    <div class="p-6 pb-2 flex justify-between items-center text-[10px] font-bold text-slate-400">
                        <span class="bg-white/5 px-3 py-1.5 rounded-lg flex items-center gap-1">
                             <i data-lucide="hash" class="w-3 h-3"></i> ${state.currentIndex + 1} / ${state.selectedQuestions.length}
                        </span>
                        ${state.settings.useTimer && !state.feedback ? `<span class="text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg flex items-center gap-2">
                             <i data-lucide="timer" class="w-3 h-3"></i> <span id="timerDisplay">${state.timeLeft}</span> ثانية</span>` : ''}
                        <span class="text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg flex items-center gap-1">
                             <i data-lucide="check-circle-2" class="w-3 h-3"></i> ${state.score}
                        </span>
                    </div>
                    
                    <div class="px-6 mt-4">
                        <div class="progress-track"><div class="progress-thumb" style="width: ${progress}%"></div></div>
                    </div>

                    <div class="p-8 flex-1">
                        <h2 class="text-xl font-bold text-right leading-relaxed mb-10 min-h-[60px]">${q.question}</h2>
                        <div class="grid gap-3">
                            ${state.currentOptions.map(opt => {
                                let cls = 'hover:bg-white/10';
                                if (state.feedback) {
                                    if (opt === q.correctAnswer) cls = 'correct';
                                    else if (opt === state.feedback.selected) cls = 'incorrect';
                                    else cls = 'opacity-20';
                                } else if (state.revealed && opt === q.correctAnswer) {
                                    cls = 'border-emerald-500 bg-emerald-500/20 text-emerald-300';
                                }
                                return `<button onclick="handleSelect('${opt.replace(/'/g, "\\'")}')" ${state.feedback ? 'disabled' : ''} class="option-card w-full p-5 rounded-2xl text-right text-sm font-bold ${cls}">${opt}</button>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="p-6 pt-0 space-y-3">
                        ${state.settings.enableReveal && !state.feedback && !state.revealed ? `
                        <button onclick="revealAnswer()" class="w-full py-4 border border-emerald-500/30 bg-emerald-500/5 text-emerald-400 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-emerald-500/10 transition-colors">
                            <i data-lucide="eye" class="w-4 h-4"></i> كشف الإجابة الصحيحة
                        </button>` : ''}
                        
                        ${state.feedback ? `
                        <button onclick="nextStep()" class="btn-primary w-full py-5 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2">
                            ${state.currentIndex + 1 === state.selectedQuestions.length ? 'رؤية النتائج' : 'السؤال التالي'}
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>` : ''}
                    </div>
                </div>`;
            lucide.createIcons();
        }

        fetchQuestions(state.currentTopicId);
    </script>
</body>
</html>
